// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'

        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

apply plugin: "com.facebook.react.rootproject"

// ffmpeg-kit-react-native reads rootProject.ext.ffmpegKitPackage to decide
// which com.arthenica:ffmpeg-kit-<variant> artifact to pull. Setting it on
// the :app subproject (where it lived in v1.0.77) leaves rootProject's ext
// untouched, so the library falls back to the default "https" variant —
// which is the one the CI build was failing to resolve. Set it here so
// safeExtGet() actually finds it.
ext {
    ffmpegKitPackage = "audio"
}

// Arthenica retired com.arthenica:ffmpeg-kit-* in 2025, so we route every
// subproject's resolve through io.github.maxrave-dev's community mirror.
// Has to live in allprojects (not just :app) because the broken dependency
// is declared INSIDE the :ffmpeg-kit-react-native autolinked subproject —
// putting the substitute clause on :app alone, like v1.0.77/v1.0.78 did,
// never gets a chance to rewrite that request.
allprojects {
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute(module("com.arthenica:ffmpeg-kit-audio"))
                .using(module("io.github.maxrave-dev:ffmpeg-kit-audio:6.0.1"))
                .withoutClassifier()
        }
    }
}

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
